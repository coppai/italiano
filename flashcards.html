<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Flashcards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flashcards-page">

<div class="container">
    <div class="header">
        <h1>Italian Flashcards</h1>
    </div>

    <div id="noCards" class="no-cards" style="display: none;">
        <h2>No Flashcards Yet</h2>
        <p>You haven't added any flashcards yet. Add some to get started!</p>
        <a href="admin.html">Add Flashcards</a>
    </div>

    <div id="flashcardArea" style="display: none;">
        <div class="filter-section">
            <label for="categoryFilter">Filter by Category:</label>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>
            <button id="reverseBtn" class="btn-secondary" style="margin-left: 1rem;">
                <span>🔄 Reverse Cards</span>
            </button>
        </div>

        <div class="progress">
            Completed: <span id="currentCard">0</span> / <span id="totalCards">0</span>
        </div>

        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-face flashcard-front">
                    <div class="flashcard-label">Question</div>
                    <div class="flashcard-content" id="question"></div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div class="flashcard-label">Answer</div>
                    <div class="flashcard-content" id="answer"></div>
                    <div class="card-notes" id="cardNotes"></div>
                    <div class="card-answer-buttons">
                        <button id="incorrectBtn" class="btn-incorrect">✗ Incorrect</button>
                        <button id="correctBtn" class="btn-correct">✓ Correct</button>
                    </div>
                    <div class="card-stats" id="cardStats"></div>
                    <div class="card-actions">
                        <button id="pronounceBtn" class="btn-success">
                            <span>🔊 Pronounce</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tap-hint">👆 Tap card to flip</div>

        <div class="controls">
            <button id="prevBtn" class="btn-secondary">
                <span>← Previous</span>
            </button>
            <button id="shuffleBtn" class="btn-secondary">
                <span>🔀 Shuffle</span>
            </button>
            <button id="nextBtn" class="btn-primary">
                <span>Next →</span>
            </button>
        </div>
    </div>

    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
    let allFlashcards = [];  // Store all cards
    let flashcards = [];  // Currently displayed cards (shuffled/filtered view)
    let currentIndex = 0;
    let isFlipped = false;
    let isReversed = false;      // Track if cards are reversed (Answer -> Question)
    let completedCards = new Set();  // Track cards marked as correct (by card.id)
    let currentFilter = 'all';       // Track which category is currently selected

    const flashcardEl = document.getElementById('flashcard');
    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const currentCardEl = document.getElementById('currentCard');
    const totalCardsEl = document.getElementById('totalCards');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pronounceBtn = document.getElementById('pronounceBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const flashcardArea = document.getElementById('flashcardArea');
    const noCardsArea = document.getElementById('noCards');
    const correctBtn = document.getElementById('correctBtn');
    const incorrectBtn = document.getElementById('incorrectBtn');
    const cardStatsEl = document.getElementById('cardStats');
    const cardNotesEl = document.getElementById('cardNotes');
    const categoryFilter = document.getElementById('categoryFilter');
    const reverseBtn = document.getElementById('reverseBtn');

    // Load flashcards
    async function loadFlashcards() {
        try {
            const response = await fetch('flashcards.json');
            allFlashcards = await response.json();
            
            // Initialize IDs, counts, and categories if they don't exist
            allFlashcards = allFlashcards.map(card => ({
                ...card,
                id: card.id || Date.now().toString() + Math.random().toString(36).substr(2, 9),
                categories: card.categories || [],
                notes: card.notes || '',
                correct: card.correct || 0,
                incorrect: card.incorrect || 0
            }));
            
            // Populate category filter
            populateCategoryFilter();
            
            // Show all cards initially
            flashcards = [...allFlashcards];
            
            if (flashcards.length === 0) {
                noCardsArea.style.display = 'block';
                flashcardArea.style.display = 'none';
            } else {
                noCardsArea.style.display = 'none';
                flashcardArea.style.display = 'block';
                totalCardsEl.textContent = flashcards.length;
                // Automatically shuffle on load
                shuffleCards();
                showCard(0);
            }
        } catch (error) {
            console.error('Error loading flashcards:', error);
            noCardsArea.style.display = 'block';
            flashcardArea.style.display = 'none';
        }
    }

    // Populate category filter dropdown
    function populateCategoryFilter() {
        const categories = new Set();
        allFlashcards.forEach(card => {
            if (card.categories && card.categories.length > 0) {
                card.categories.forEach(cat => categories.add(cat));
            }
        });
        
        // Clear existing options except "All Categories"
        categoryFilter.innerHTML = '<option value="all">All Categories</option>';
        
        // Add category options sorted alphabetically
        Array.from(categories).sort().forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = category;
            categoryFilter.appendChild(option);
        });
    }

    // Filter flashcards by category
    function filterByCategory(category) {
        currentFilter = category;

        if (category === 'all') {
            flashcards = [...allFlashcards];
        } else {
            flashcards = allFlashcards.filter(card => 
                card.categories && card.categories.includes(category)
            );
        }
        
        if (flashcards.length === 0) {
            noCardsArea.querySelector('h2').textContent = 'No Cards in This Category';
            noCardsArea.querySelector('p').textContent = 'Try selecting a different category.';
            noCardsArea.style.display = 'block';
            flashcardArea.style.display = 'none';
        } else {
            noCardsArea.style.display = 'none';
            flashcardArea.style.display = 'block';
            totalCardsEl.textContent = flashcards.length;
            // Shuffle cards whenever a new category is selected
            shuffleCards();
            showCard(0);
        }
    }

    // Category filter change handler
    categoryFilter.addEventListener('change', (e) => {
        filterByCategory(e.target.value);
    });

    // Show a specific card
    function showCard(index) {
        if (flashcards.length === 0) return;
        
        currentIndex = index;
        const card = flashcards[currentIndex];
        
        // Swap question/answer if reversed
        const displayQuestion = isReversed ? card.answer : card.question;
        const displayAnswer = isReversed ? card.question : card.answer;
        const frontLabel = isReversed ? 'Answer' : 'Question';
        const backLabel = isReversed ? 'Question' : 'Answer';
        
        // Update labels
        document.querySelector('.flashcard-front .flashcard-label').textContent = frontLabel;
        document.querySelector('.flashcard-back .flashcard-label').textContent = backLabel;
        
        questionEl.textContent = displayQuestion;
        answerEl.textContent = displayAnswer;
        cardNotesEl.textContent = card.notes || '';
        
        // Show completed count vs total cards in current view (respecting filters).
        // Use allFlashcards so that cards you've already completed (and removed
        // from the current deck) still count toward the completed total.
        const relevantCards = currentFilter === 'all'
            ? allFlashcards
            : allFlashcards.filter(c => c.categories && c.categories.includes(currentFilter));

        const totalCardsInView = relevantCards.length;
        const completedInView = relevantCards.reduce((count, c) =>
            completedCards.has(c.id) ? count + 1 : count,
            0
        );

        currentCardEl.textContent = completedInView;
        totalCardsEl.textContent = totalCardsInView;
        
        // Update stats display
        const correct = card.correct || 0;
        const incorrect = card.incorrect || 0;
        cardStatsEl.textContent = `✓ ${correct}  ✗ ${incorrect}`;
        
        // Reset flip state
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
        }
        
        // Update button states
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === flashcards.length - 1;
    }

    // Flip card
    flashcardEl.addEventListener('click', (e) => {
        // Don't flip if clicking on the buttons
        if (e.target.tagName === 'BUTTON') return;
        flashcardEl.classList.toggle('flipped');
        isFlipped = !isFlipped;
    });

    // Navigation
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            showCard(currentIndex - 1);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < flashcards.length - 1) {
            showCard(currentIndex + 1);
        }
    });

    // Pronounce
    pronounceBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        const textToSpeak = isFlipped ? card.answer : card.question;
        
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'it-IT'; // Italian
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        } else {
            alert('Text-to-speech is not supported in your browser.');
        }
    });

    // Reverse cards button
    reverseBtn.addEventListener('click', () => {
        isReversed = !isReversed;
        reverseBtn.querySelector('span').textContent = isReversed ? '🔄 Normal Cards' : '🔄 Reverse Cards';
        showCard(currentIndex);
    });

    // Shuffle function
    function shuffleCards() {
        // Weighted shuffle - cards with more incorrect answers appear more often
        const weightedCards = [];
        
        flashcards.forEach((card, index) => {
            const incorrect = card.incorrect || 0;
            const correct = card.correct || 0;
            
            // Base weight of 1, plus extra weight based on incorrect answers
            // Cards with no history get weight of 2 to ensure they're practiced
            let weight = 1;
            if (incorrect === 0 && correct === 0) {
                weight = 2; // New cards get medium priority
            } else {
                // Add weight based on incorrect/total ratio
                const total = incorrect + correct;
                const incorrectRatio = incorrect / total;
                weight = 1 + Math.floor(incorrectRatio * 3); // 1-4 weight
            }
            
            // Add the card index multiple times based on weight
            for (let i = 0; i < weight; i++) {
                weightedCards.push(index);
            }
        });
        
        // Shuffle the weighted array
        weightedCards.sort(() => Math.random() - 0.5);
        
        // Create new order without duplicates
        const newOrder = [];
        const seen = new Set();
        
        for (const index of weightedCards) {
            if (!seen.has(index)) {
                newOrder.push(flashcards[index]);
                seen.add(index);
            }
        }
        
        flashcards = newOrder;
    }

    // Shuffle button
    shuffleBtn.addEventListener('click', () => {
        shuffleCards();
        showCard(0);
    });

    // Update card stats on server
    async function updateCardStats(card) {
        console.log('Updating card stats:', { id: card.id, correct: card.correct, incorrect: card.incorrect });
        try {
            const response = await fetch('/api/update-flashcard-stats', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: card.id,
                    correct: card.correct,
                    incorrect: card.incorrect
                })
            });

            const result = await response.json();
            console.log('Server response:', result);

            if (!response.ok) {
                console.error('Failed to update card stats:', result);
            }
        } catch (error) {
            console.error('Error updating card stats:', error);
        }
    }

    // Correct button
    correctBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        card.correct = (card.correct || 0) + 1;
        
        // Mark this card as completed
        completedCards.add(card.id);
        
        // Update display
        cardStatsEl.textContent = `✓ ${card.correct}  ✗ ${card.incorrect || 0}`;
        
        // Update on server
        await updateCardStats(card);
        
        // Remove this card from the deck
        flashcards.splice(currentIndex, 1);
        
        // Check if all cards completed
        if (flashcards.length === 0) {
            alert('🎉 Congratulations! You\'ve completed all cards!');
            return;
        }
        
        // Show next card (or same index if it was the last card)
        const nextIndex = currentIndex >= flashcards.length ? flashcards.length - 1 : currentIndex;
        
        // Flip card back if flipped, then advance to next card
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
            // Wait for flip animation (600ms) before showing next card
            setTimeout(() => {
                showCard(nextIndex);
            }, 600);
        } else {
            // If not flipped, advance immediately
            showCard(nextIndex);
        }
    });

    // Incorrect button
    incorrectBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        card.incorrect = (card.incorrect || 0) + 1;
        
        // Update display
        cardStatsEl.textContent = `✓ ${card.correct || 0}  ✗ ${card.incorrect}`;
        
        // Update on server
        await updateCardStats(card);
        
        // Re-add this card later in the deck (3-5 cards ahead)
        const cardsAhead = Math.min(3 + Math.floor(Math.random() * 3), flashcards.length - currentIndex - 1);
        const insertPosition = Math.min(currentIndex + cardsAhead, flashcards.length);
        
        // Remove card from current position
        const cardToRequeue = flashcards.splice(currentIndex, 1)[0];
        
        // Insert it later in the deck
        flashcards.splice(insertPosition, 0, cardToRequeue);
        
        // Show next card (which is now at current index)
        const nextIndex = currentIndex >= flashcards.length ? flashcards.length - 1 : currentIndex;
        
        // Flip card back if flipped, then advance to next card
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
            // Wait for flip animation (600ms) before showing next card
            setTimeout(() => {
                showCard(nextIndex);
            }, 600);
        } else {
            // If not flipped, advance immediately
            showCard(nextIndex);
        }
    });

    // All card management (edit/delete) is now done from admin page

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && currentIndex > 0) {
            showCard(currentIndex - 1);
        } else if (e.key === 'ArrowRight' && currentIndex < flashcards.length - 1) {
            showCard(currentIndex + 1);
        } else if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            flashcardEl.click();
        }
    });

    // Initialize
    loadFlashcards();
</script>

</body>
</html>
