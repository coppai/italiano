<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Flashcards</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #datePicker:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.3);
        }
        
        #datePicker::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="flashcards-page">

<div class="container">
    <div class="header">
        <h1>Italian Flashcards</h1>
    </div>

    <div id="noCards" class="no-cards" style="display: none;">
        <h2>No Flashcards Yet</h2>
        <p>You haven't added any flashcards yet. Add some to get started!</p>
        <a href="admin.html">Add Flashcards</a>
    </div>

    <div id="flashcardArea" style="display: none;">
        <div class="filter-section">
            <button id="categoryFilterBtn" class="category-filter-btn">
                📁 Categories <span id="categoryCount"></span>
            </button>
            <input type="date" id="datePicker" class="date-picker-input">
        </div>

        <!-- Category Filter Modal -->
        <div id="categoryModal" class="category-modal" style="display: none;">
            <div class="category-modal-content">
                <div class="category-modal-header">
                    <h3>Select Categories</h3>
                    <button id="closeModal" class="close-modal">✕</button>
                </div>
                <div id="categoryList" class="category-list"></div>
                <div class="category-modal-footer">
                    <button id="clearAllBtn" class="btn-secondary">Clear All</button>
                    <button id="applyFiltersBtn" class="btn-primary">Apply Filters</button>
                </div>
            </div>
        </div>

        <div id="dateProgress" style="margin: 10px 0; text-align: center; color: #3498db; font-weight: bold; display: none;"></div>

        <div class="progress">
            Completed: <span id="currentCard">0</span> / <span id="totalCards">0</span>
        </div>

        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-face flashcard-front">
                    <div class="flashcard-label">Question</div>
                    <div class="flashcard-content" id="question"></div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div class="flashcard-label">Answer</div>
                    <div class="flashcard-content" id="answer"></div>
                    <div class="card-notes" id="cardNotes"></div>
                    <div class="card-answer-buttons">
                        <button id="incorrectBtn" class="btn-incorrect">✗ Incorrect</button>
                        <button id="correctBtn" class="btn-correct">✓ Correct</button>
                    </div>
                    <div class="card-stats" id="cardStats"></div>
                    <div class="card-actions">
                        <button id="pronounceBtn" class="btn-success">
                            <span>🔊 Pronounce</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tap-hint">👆 Tap card to flip</div>

        <div class="controls">
            <button id="prevBtn" class="btn-secondary">
                <span>← Previous</span>
            </button>
						<button id="nextBtn" class="btn-primary">
                <span>Next →</span>
            </button>
            <button id="shuffleBtn" class="btn-secondary">
                <span>🔀 Shuffle</span>
            </button>
            <button id="theFiveBtn" class="btn-secondary">
                <span>✋ The Five</span>
            </button>
            <button id="reverseBtn" class="btn-secondary reverse-btn">
                <span>🔄 Reverse Cards</span>
            </button>
            
        </div>
    </div>

    <div class="back-link">
        <a href="/">← Back to Home</a>
        <a href="flashcard-stats.html" style="margin-left: 20px;">📊 View Stats</a>
    </div>
</div>

<script>
    let allFlashcards = [];  // Store all cards
    let flashcards = [];  // Currently displayed cards (shuffled/filtered view)
    let currentIndex = 0;
    let isFlipped = false;
    let isReversed = false;      // Track if cards are reversed (Answer -> Question)
    let completedCards = new Set();  // Track cards marked as correct (by card.id)
    let selectedCategories = new Set();  // Track selected category filters
    let theFiveMode = false;         // Track if "The Five" mode is active
    let theFiveOffset = 0;           // Track which batch of 5 we're showing
    let theFiveCompleted = 0;        // Track how many of current batch are completed
    let sortMode = null;             // 'date' or 'shuffle' - default to null (show all cards)
    let selectedDate = null;         // Currently selected date for date mode
    let dateCompletedCards = new Set(); // Track cards completed in current date session

    const flashcardEl = document.getElementById('flashcard');
    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const currentCardEl = document.getElementById('currentCard');
    const totalCardsEl = document.getElementById('totalCards');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pronounceBtn = document.getElementById('pronounceBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const flashcardArea = document.getElementById('flashcardArea');
    const noCardsArea = document.getElementById('noCards');
    const correctBtn = document.getElementById('correctBtn');
    const incorrectBtn = document.getElementById('incorrectBtn');
    const cardStatsEl = document.getElementById('cardStats');
    const cardNotesEl = document.getElementById('cardNotes');
    const categoryFilterBtn = document.getElementById('categoryFilterBtn');
    const categoryModal = document.getElementById('categoryModal');
    const categoryList = document.getElementById('categoryList');
    const closeModal = document.getElementById('closeModal');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const applyFiltersBtn = document.getElementById('applyFiltersBtn');
    const categoryCount = document.getElementById('categoryCount');
    const reverseBtn = document.getElementById('reverseBtn');
    const theFiveBtn = document.getElementById('theFiveBtn');
    const datePicker = document.getElementById('datePicker');
    const dateProgress = document.getElementById('dateProgress');

    console.log('DOM elements:', {
        datePicker: !!datePicker,
        dateProgress: !!dateProgress
    });

    // Load flashcards
    async function loadFlashcards() {
        try {
            const response = await fetch('flashcards.json');
            allFlashcards = await response.json();
            
            // Initialize IDs, counts, dates, and categories if they don't exist
            allFlashcards = allFlashcards.map(card => ({
                ...card,
                id: card.id || Date.now().toString() + Math.random().toString(36).substr(2, 9),
                categories: card.categories || [],
                notes: card.notes || '',
                correct: card.correct || 0,
                incorrect: card.incorrect || 0,
                dateAdded: card.dateAdded || '2026-01-01' // Default old cards to past date
            }));
            
            // Populate category filter
            populateCategoryFilter();
            
            // Show all cards initially
            flashcards = [...allFlashcards];
            
            if (flashcards.length === 0) {
                noCardsArea.style.display = 'block';
                flashcardArea.style.display = 'none';
            } else {
                noCardsArea.style.display = 'none';
                flashcardArea.style.display = 'block';
                totalCardsEl.textContent = flashcards.length;
                // Show all cards by default without date filtering
                setupDatePickerRange(); // Set up min/max dates but don't select one
                showCard(0);
            }
        } catch (error) {
            console.error('Error loading flashcards:', error);
            noCardsArea.style.display = 'block';
            flashcardArea.style.display = 'none';
        }
    }

    // Populate category filter checkboxes in modal
    function populateCategoryFilter() {
        const categories = new Set();
        let hasUncategorized = false;
        
        allFlashcards.forEach(card => {
            if (card.categories && card.categories.length > 0) {
                card.categories.forEach(cat => categories.add(cat));
            } else {
                hasUncategorized = true;
            }
        });
        
        // Clear existing list
        categoryList.innerHTML = '';
        
        // Add "uncategorized" checkbox first if there are uncategorized cards
        if (hasUncategorized) {
            const item = createCategoryCheckbox('uncategorized');
            categoryList.appendChild(item);
        }
        
        // Add category checkboxes sorted alphabetically
        Array.from(categories).sort().forEach(category => {
            const item = createCategoryCheckbox(category);
            categoryList.appendChild(item);
        });
        
        updateCategoryCount();
    }

    // Create a checkbox item for a category
    function createCategoryCheckbox(category) {
        const label = document.createElement('label');
        label.className = 'category-checkbox-item';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = category;
        checkbox.checked = selectedCategories.has(category);
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                selectedCategories.add(category);
            } else {
                selectedCategories.delete(category);
            }
            updateCategoryCount();
        });
        
        const span = document.createElement('span');
        span.textContent = category;
        
        label.appendChild(checkbox);
        label.appendChild(span);
        
        return label;
    }

    // Update the category count indicator on the button
    function updateCategoryCount() {
        if (selectedCategories.size > 0) {
            categoryCount.textContent = ` (${selectedCategories.size})`;
            categoryFilterBtn.classList.add('has-filters');
        } else {
            categoryCount.textContent = '';
            categoryFilterBtn.classList.remove('has-filters');
        }
    }

    // Open category modal
    categoryFilterBtn.addEventListener('click', () => {
        categoryModal.style.display = 'flex';
    });

    // Close category modal
    function closeCategoryModal() {
        categoryModal.style.display = 'none';
    }

    closeModal.addEventListener('click', closeCategoryModal);
    
    // Close modal when clicking outside
    categoryModal.addEventListener('click', (e) => {
        if (e.target === categoryModal) {
            closeCategoryModal();
        }
    });

    // Clear all filters
    clearAllBtn.addEventListener('click', () => {
        selectedCategories.clear();
        const checkboxes = categoryList.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = false);
        updateCategoryCount();
    });

    // Apply filters and close modal
    applyFiltersBtn.addEventListener('click', () => {
        applyFilters();
        closeCategoryModal();
    });
    
    // Filter flashcards by selected categories (OR logic)
    function applyFilters() {
        let filteredCards;
        if (selectedCategories.size === 0) {
            // No filters selected, show all cards
            filteredCards = [...allFlashcards];
        } else {
            // Show cards that match ANY of the selected categories (OR)
            filteredCards = allFlashcards.filter(card => {
                // Check if "uncategorized" is selected and card has no categories
                if (selectedCategories.has('uncategorized') && (!card.categories || card.categories.length === 0)) {
                    return true;
                }
                // Check if card has any of the selected categories
                if (card.categories && card.categories.length > 0) {
                    return card.categories.some(cat => selectedCategories.has(cat));
                }
                return false;
            });
        }
        
        // If "The Five" mode is active, only show 5 cards at a time
        if (theFiveMode) {
            flashcards = filteredCards.slice(theFiveOffset, theFiveOffset + 5);
            theFiveCompleted = 0;
        } else {
            flashcards = filteredCards;
        }
        
        if (flashcards.length === 0) {
            noCardsArea.querySelector('h2').textContent = 'No Cards Match Selected Categories';
            noCardsArea.querySelector('p').textContent = 'Try selecting different categories.';
            noCardsArea.style.display = 'block';
            flashcardArea.style.display = 'none';
        } else {
            noCardsArea.style.display = 'none';
            flashcardArea.style.display = 'block';
            totalCardsEl.textContent = flashcards.length;
            // Apply current sort mode when filters change (but not in The Five mode)
            if (!theFiveMode) {
                if (sortMode === 'date') {
                    sortByDate();
                } else if (sortMode === 'shuffle') {
                    shuffleCards();
                }
                // If sortMode is null, keep cards in their natural order
            }
            showCard(0);
        }
    }

    // Show a specific card
    function showCard(index) {
        if (flashcards.length === 0) return;
        
        currentIndex = index;
        const card = flashcards[currentIndex];
        
        // Swap question/answer if reversed
        const displayQuestion = isReversed ? card.answer : card.question;
        const displayAnswer = isReversed ? card.question : card.answer;
        const frontLabel = isReversed ? 'Answer' : 'Question';
        const backLabel = isReversed ? 'Question' : 'Answer';
        
        // Update labels
        document.querySelector('.flashcard-front .flashcard-label').textContent = frontLabel;
        document.querySelector('.flashcard-back .flashcard-label').textContent = backLabel;
        
        questionEl.textContent = displayQuestion;
        answerEl.textContent = displayAnswer;
        
        // Show notes with date info
        //const dateInfo = getDateLabel(card.dateAdded);
        const notesText = card.notes || '';
        cardNotesEl.textContent = notesText;
        // if (dateInfo) {
        //     const dateLabel = document.createElement('div');
        //     dateLabel.style.cssText = 'margin-top: 8px; padding: 4px 8px; background: rgba(52, 152, 219, 0.1); border-radius: 4px; font-size: 0.85em; color: #3498db;';
        //     dateLabel.textContent = dateInfo;
        //     cardNotesEl.appendChild(dateLabel);
        // }
        
        // Show completed count vs total cards in current view (respecting filters).
        // Use allFlashcards so that cards you've already completed (and removed
        // from the current deck) still count toward the completed total.
        const relevantCards = selectedCategories.size === 0
            ? allFlashcards
            : allFlashcards.filter(c => {
                // Check if "uncategorized" is selected and card has no categories
                if (selectedCategories.has('uncategorized') && (!c.categories || c.categories.length === 0)) {
                    return true;
                }
                // Check if card has any of the selected categories
                if (c.categories && c.categories.length > 0) {
                    return c.categories.some(cat => selectedCategories.has(cat));
                }
                return false;
            });

        const totalCardsInView = relevantCards.length;
        const completedInView = relevantCards.reduce((count, c) =>
            completedCards.has(c.id) ? count + 1 : count,
            0
        );

        currentCardEl.textContent = completedInView;
        totalCardsEl.textContent = totalCardsInView;
        
        // Update stats display
        const correct = card.correct || 0;
        const incorrect = card.incorrect || 0;
        cardStatsEl.textContent = `✓ ${correct}  ✗ ${incorrect}`;
        
        // Reset flip state
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
        }
        
        // Update button states
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === flashcards.length - 1;
    }

    // Flip card
    flashcardEl.addEventListener('click', (e) => {
        // Don't flip if clicking on the buttons
        if (e.target.tagName === 'BUTTON') return;
        flashcardEl.classList.toggle('flipped');
        isFlipped = !isFlipped;
    });

    // Navigation
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            showCard(currentIndex - 1);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < flashcards.length - 1) {
            showCard(currentIndex + 1);
        }
    });

    // Pronounce
    pronounceBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        
        // Determine what text to speak based on what's currently showing
        // When isReversed is true, the display is swapped
        let textToSpeak;
        if (isReversed) {
            // Cards are reversed: front shows answer, back shows question
            textToSpeak = isFlipped ? card.question : card.answer;
        } else {
            // Normal: front shows question, back shows answer
            textToSpeak = isFlipped ? card.answer : card.question;
        }
        
        console.log('Pronounce clicked:', { textToSpeak, isFlipped, isReversed });
        
        if (!textToSpeak) {
            console.error('No text to speak');
            return;
        }
        
        if ('speechSynthesis' in window) {
            // Cancel any ongoing speech
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'it-IT'; // Italian
            utterance.rate = 0.9;
            
            utterance.onerror = (event) => {
                console.error('Speech synthesis error:', event);
            };
            
            speechSynthesis.speak(utterance);
        } else {
            alert('Text-to-speech is not supported in your browser.');
        }
    });

    // Reverse cards button
    reverseBtn.addEventListener('click', () => {
        isReversed = !isReversed;
        reverseBtn.querySelector('span').textContent = isReversed ? '🔄 Normal Cards' : '🔄 Reverse Cards';
        showCard(currentIndex);
    });

    // The Five button
    theFiveBtn.addEventListener('click', () => {
        theFiveMode = !theFiveMode;
        
        if (theFiveMode) {
            theFiveOffset = 0;
            theFiveCompleted = 0;
            theFiveBtn.querySelector('span').textContent = '✋ Exit The Five';
            theFiveBtn.classList.add('selected');
        } else {
            theFiveBtn.querySelector('span').textContent = '✋ The Five';
            theFiveBtn.classList.remove('selected');
        }
        
        applyFilters();
    });

    // Set up date picker range without selecting a default date
    function setupDatePickerRange() {
        console.log('Setting up date picker, total cards:', allFlashcards.length);
        
        // Get all unique dates from cards
        const dates = Array.from(new Set(allFlashcards.map(c => c.dateAdded))).filter(d => d).sort((a, b) => b.localeCompare(a));
        
        console.log('Found dates:', dates);
        
        if (dates.length === 0) {
            console.warn('No dates found in flashcards');
            return;
        }
        
        // Set min and max dates for the picker
        datePicker.min = dates[dates.length - 1]; // oldest
        datePicker.max = dates[0]; // newest
        
        console.log('Date picker range:', datePicker.min, 'to', datePicker.max);
        
        // Don't set a default value - let user choose when they want to filter by date
    }
    
    // Format date for display in selector
    function formatDateForDisplay(dateStr) {
        if (!dateStr) return 'Unknown';
        
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        
        if (dateStr === today) {
            return `📌 Today (${dateStr})`;
        } else if (dateStr === yesterday) {
            return `📆 Yesterday (${dateStr})`;
        } else {
            const daysAgo = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
            if (daysAgo <= 30 && daysAgo > 0) {
                return `📆 ${daysAgo} days ago (${dateStr})`;
            } else {
                return `📆 ${dateStr}`;
            }
        }
    }
    
    // Update date progress indicator
    function updateDateProgress() {
        if (sortMode !== 'date' || !selectedDate) {
            dateProgress.textContent = '';
            return;
        }
        
        const cardsForDate = allFlashcards.filter(card => card.dateAdded === selectedDate);
        const completedForDate = cardsForDate.filter(card => dateCompletedCards.has(card.id)).length;
        dateProgress.textContent = `${completedForDate} / ${cardsForDate.length} completed`;
    }
    
    // Handle date picker change
    datePicker.addEventListener('change', () => {
        console.log('Date changed to:', datePicker.value);
        
        if (!datePicker.value) {
            // Date cleared - show all cards
            sortMode = null;
            selectedDate = null;
            dateProgress.style.display = 'none';
            flashcards = [...allFlashcards];
            totalCardsEl.textContent = flashcards.length;
            showCard(0);
            return;
        }
        
        selectedDate = datePicker.value;
        
        // Check if this date has cards
        const cardsForDate = allFlashcards.filter(c => c.dateAdded === selectedDate);
        if (cardsForDate.length === 0) {
            alert('No cards found for this date. Please select a date when you added flashcards.');
            datePicker.value = ''; // Clear the picker
            return;
        }
        
        sortMode = 'date';
        dateProgress.style.display = 'block';
        dateCompletedCards.clear(); // Reset completion tracking for new date
        filterBySelectedDate();
        showCard(0);
    });
    
    // Filter flashcards by selected date
    function filterBySelectedDate() {
        if (!selectedDate) return;
        
        // Filter to only cards from selected date that haven't been completed in this session
        flashcards = allFlashcards.filter(card => 
            card.dateAdded === selectedDate && !dateCompletedCards.has(card.id)
        );
        
        totalCardsEl.textContent = flashcards.length;
        updateDateProgress();
        
        if (flashcards.length === 0) {
            // All cards for this date completed, move to next date
            moveToNextDate();
        }
    }
    
    // Move to the next available date (previous day)
    function moveToNextDate() {
        const dates = Array.from(new Set(allFlashcards.map(c => c.dateAdded))).filter(d => d).sort((a, b) => b.localeCompare(a));
        const currentIndex = dates.indexOf(selectedDate);
        
        if (currentIndex < dates.length - 1) {
            // Move to next date
            const nextDate = dates[currentIndex + 1];
            selectedDate = nextDate;
            datePicker.value = nextDate;
            dateCompletedCards.clear();
            alert(`🎉 Great job! All cards for ${formatDateForDisplay(dates[currentIndex])} completed!\n\nMoving to ${formatDateForDisplay(nextDate)}...`);
            filterBySelectedDate();
            showCard(0);
        } else {
            alert('🎉 Congratulations! You\'ve completed all cards for all dates!');
            noCardsArea.querySelector('h2').textContent = 'All Cards Completed!';
            noCardsArea.querySelector('p').textContent = 'Great job! You\'ve reviewed all your flashcards.';
            noCardsArea.style.display = 'block';
            flashcardArea.style.display = 'none';
        }
    }

    // Get human-readable date label
    function getDateLabel(dateAdded) {
        if (!dateAdded) return null;
        
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        
        if (dateAdded === today) {
            return '📌 Added today';
        } else if (dateAdded === yesterday) {
            return '📆 Added yesterday';
        } else {
            const daysAgo = Math.floor((Date.now() - new Date(dateAdded).getTime()) / 86400000);
            if (daysAgo <= 30) {
                return `📆 Added ${daysAgo} days ago`;
            } else {
                return `📆 Added ${dateAdded}`;
            }
        }
    }

    // Sort by date (newest first) - now also filters by selected date
    function sortByDate() {
        if (selectedDate) {
            filterBySelectedDate();
        } else {
            flashcards.sort((a, b) => {
                const dateA = a.dateAdded || '1970-01-01';
                const dateB = b.dateAdded || '1970-01-01';
                return dateB.localeCompare(dateA); // Newest first
            });
        }
    }

    // Shuffle function
    function shuffleCards() {
        // Weighted shuffle - cards with more incorrect answers appear more often
        const weightedCards = [];
        
        flashcards.forEach((card, index) => {
            const incorrect = card.incorrect || 0;
            const correct = card.correct || 0;
            
            // Base weight of 1, plus extra weight based on incorrect answers
            // Cards with no history get weight of 2 to ensure they're practiced
            let weight = 1;
            if (incorrect === 0 && correct === 0) {
                weight = 2; // New cards get medium priority
            } else {
                // Add weight based on incorrect/total ratio
                const total = incorrect + correct;
                const incorrectRatio = incorrect / total;
                weight = 1 + Math.floor(incorrectRatio * 3); // 1-4 weight
            }
            
            // Add the card index multiple times based on weight
            for (let i = 0; i < weight; i++) {
                weightedCards.push(index);
            }
        });
        
        // Shuffle the weighted array
        weightedCards.sort(() => Math.random() - 0.5);
        
        // Create new order without duplicates
        const newOrder = [];
        const seen = new Set();
        
        for (const index of weightedCards) {
            if (!seen.has(index)) {
                newOrder.push(flashcards[index]);
                seen.add(index);
            }
        }
        
        flashcards = newOrder;
    }

    // Sort by date button
    // Note: Date selection is now handled by datePicker change event
    // The button click will trigger the native date picker to open

    // Shuffle button
    shuffleBtn.addEventListener('click', () => {
        sortMode = 'shuffle';
        shuffleBtn.classList.add('selected');
        
        // Get currently filtered cards based on BOTH category and date filters
        let filteredCards = [...allFlashcards];
        
        // Apply category filters if any are selected
        if (selectedCategories.size > 0) {
            filteredCards = filteredCards.filter(card => {
                // Check if "uncategorized" is selected and card has no categories
                if (selectedCategories.has('uncategorized') && (!card.categories || card.categories.length === 0)) {
                    return true;
                }
                // Check if card has any of the selected categories
                if (card.categories && card.categories.length > 0) {
                    return card.categories.some(cat => selectedCategories.has(cat));
                }
                return false;
            });
        }
        
        // Apply date filter if a date is selected
        if (selectedDate) {
            filteredCards = filteredCards.filter(card => 
                card.dateAdded === selectedDate && !dateCompletedCards.has(card.id)
            );
        }
        
        flashcards = filteredCards;
        shuffleCards(); // Shuffle the filtered cards
        totalCardsEl.textContent = flashcards.length;
        showCard(0);
    });

    // Update card stats on server
    async function updateCardStats(card) {
        console.log('Updating card stats:', { id: card.id, correct: card.correct, incorrect: card.incorrect });
        try {
            const response = await fetch('/api/update-flashcard-stats', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: card.id,
                    correct: card.correct,
                    incorrect: card.incorrect
                })
            });

            const result = await response.json();
            console.log('Server response:', result);

            if (!response.ok) {
                console.error('Failed to update card stats:', result);
            }
        } catch (error) {
            console.error('Error updating card stats:', error);
        }
    }

    // Correct button
    correctBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        card.correct = (card.correct || 0) + 1;
        
        // Mark this card as completed
        completedCards.add(card.id);
        
        // If in date mode, also track for date-specific completion
        if (sortMode === 'date') {
            dateCompletedCards.add(card.id);
            updateDateProgress();
        }
        
        // Update display
        cardStatsEl.textContent = `✓ ${card.correct}  ✗ ${card.incorrect || 0}`;
        
        // Update on server
        await updateCardStats(card);
        
        // Remove this card from the deck
        flashcards.splice(currentIndex, 1);
        
        // If in "The Five" mode, track completion
        if (theFiveMode) {
            theFiveCompleted++;
            
            // Check if we've completed all 5 cards in this batch
            if (flashcards.length === 0 && theFiveCompleted >= 5) {
                // Move to next batch of 5
                theFiveOffset += 5;
                theFiveCompleted = 0;
                
                // Apply filters to load next 5 cards
                applyFilters();
                
                // Check if there are more cards
                if (flashcards.length === 0) {
                    alert('🎉 Congratulations! You\'ve completed all cards in this category!');
                    theFiveMode = false;
                    theFiveOffset = 0;
                    theFiveBtn.querySelector('span').textContent = '✋ The Five';
                    theFiveBtn.classList.remove('selected');
                    applyFilters();
                } else {
                    alert(`Great job! Moving to the next 5 cards (${flashcards.length} remaining in this batch).`);
                }
                return;
            }
        }
        
        // Check if all cards completed
        if (flashcards.length === 0) {
            if (sortMode === 'date') {
                // In date mode, move to next date
                moveToNextDate();
                return;
            } else if (!theFiveMode) {
                alert('🎉 Congratulations! You\'ve completed all cards!');
            }
            return;
        }
        
        // Show next card (or same index if it was the last card)
        const nextIndex = currentIndex >= flashcards.length ? flashcards.length - 1 : currentIndex;
        
        // Flip card back if flipped, then advance to next card
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
            // Wait for flip animation (600ms) before showing next card
            setTimeout(() => {
                showCard(nextIndex);
            }, 600);
        } else {
            // If not flipped, advance immediately
            showCard(nextIndex);
        }
    });

    // Incorrect button
    incorrectBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const card = flashcards[currentIndex];
        card.incorrect = (card.incorrect || 0) + 1;
        
        // Update display
        cardStatsEl.textContent = `✓ ${card.correct || 0}  ✗ ${card.incorrect}`;
        
        // Update on server
        await updateCardStats(card);
        
        // Re-add this card later in the deck (3-5 cards ahead)
        const cardsAhead = Math.min(3 + Math.floor(Math.random() * 3), flashcards.length - currentIndex - 1);
        const insertPosition = Math.min(currentIndex + cardsAhead, flashcards.length);
        
        // Remove card from current position
        const cardToRequeue = flashcards.splice(currentIndex, 1)[0];
        
        // Insert it later in the deck
        flashcards.splice(insertPosition, 0, cardToRequeue);
        
        // Show next card (which is now at current index)
        const nextIndex = currentIndex >= flashcards.length ? flashcards.length - 1 : currentIndex;
        
        // Flip card back if flipped, then advance to next card
        if (isFlipped) {
            flashcardEl.classList.remove('flipped');
            isFlipped = false;
            // Wait for flip animation (600ms) before showing next card
            setTimeout(() => {
                showCard(nextIndex);
            }, 600);
        } else {
            // If not flipped, advance immediately
            showCard(nextIndex);
        }
    });

    // All card management (edit/delete) is now done from admin page

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && currentIndex > 0) {
            showCard(currentIndex - 1);
        } else if (e.key === 'ArrowRight' && currentIndex < flashcards.length - 1) {
            showCard(currentIndex + 1);
        } else if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            flashcardEl.click();
        }
    });

    // Initialize
    loadFlashcards();
</script>

</body>
